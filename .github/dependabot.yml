version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: daily
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
