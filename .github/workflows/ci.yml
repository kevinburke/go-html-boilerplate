name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Go stable
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true
          cache-dependency-path: go.sum

      - name: Show Go version
        run: go version

      - name: Lint and test
        run: |
          go run honnef.co/go/tools/cmd/staticcheck@latest ./...
          go vet ./...
          go test -trimpath ./...
